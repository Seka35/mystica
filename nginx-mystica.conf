# Mystica.pro — nginx reverse proxy
# Path on server: /etc/nginx/sites-available/mystica
# certbot --nginx will add the SSL server block + redirect automatically.

# Force HTTPS (added by certbot --nginx --redirect, kept here as a safety net)
server {
    listen 80;
    listen [::]:80;
    server_name mystica.pro www.mystica.pro;

    # Let's Encrypt challenge path — keep this for renewal
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Health probe used by the deploy script
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # Proxy everything else to the Next.js app on :3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }

    # Long cache for static assets (Next.js /_next/static)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Long cache for tarot card images
    location /cards/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}

# HTTPS server block — populated automatically by certbot --nginx.
# This is the shape certbot generates; kept here only as documentation
# in case you ever need to recreate it manually.
